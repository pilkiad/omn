<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Status Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f2f3f7;
            color: #2d2d3a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, #dcdce4 1px, transparent 0);
            background-size: 36px 36px;
            opacity: 0.5;
        }

        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 6px rgba(0,0,0,0.04);
        }

        #header h1 {
            font-size: 0.985rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #6b6b80;
            text-transform: uppercase;
        }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.97rem;
            font-weight: 600;
            letter-spacing: 1.2px;
        }

        .slam-stats {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .slam-stat {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 3px 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.06);
            color: #8888a0;
            white-space: nowrap;
        }
        .slam-stat .val {
            font-variant-numeric: tabular-nums;
            margin-left: 4px;
        }
        .slam-stat.confidence .val { color: #3b82f6; }
        .slam-stat.frontier .val { color: #16a34a; }
        .slam-stat.growth .val { color: #d97706; }

        #nav-msg {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            padding: 24px 42px;
            border-radius: 18px;
            background: rgba(124,58,237,0.1);
            border: 2px solid rgba(124,58,237,0.2);
            box-shadow: 0 6px 30px rgba(124,58,237,0.12);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            color: #7c3aed;
            transition: all 0.35s ease;
            opacity: 0;
            transform: translateY(8px);
        }
        #nav-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #nav-msg .nav-tag {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 10px;
            margin-right: 14px;
            vertical-align: middle;
            background: rgba(124,58,237,0.15);
            color: inherit;
        }
        #nav-msg.state-idle { background: rgba(136,136,160,0.15); border-color: rgba(136,136,160,0.3); color: #8888a0; box-shadow: 0 6px 30px rgba(136,136,160,0.1); }
        #nav-msg.state-idle .nav-tag { background: rgba(136,136,160,0.2); }
        #nav-msg.state-tracking { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #16a34a; box-shadow: 0 6px 30px rgba(34,197,94,0.15); }
        #nav-msg.state-tracking .nav-tag { background: rgba(34,197,94,0.22); }
        #nav-msg.state-planning { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.35); color: #3b82f6; box-shadow: 0 6px 30px rgba(59,130,246,0.15); }
        #nav-msg.state-planning .nav-tag { background: rgba(59,130,246,0.22); }
        #nav-msg.state-error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.35); color: #dc2626; box-shadow: 0 6px 30px rgba(239,68,68,0.15); }
        #nav-msg.state-error .nav-tag { background: rgba(239,68,68,0.22); }
        #nav-msg.state-success { background: rgba(22,163,74,0.15); border-color: rgba(22,163,74,0.35); color: #16a34a; box-shadow: 0 6px 30px rgba(22,163,74,0.15); }
        #nav-msg.state-success .nav-tag { background: rgba(22,163,74,0.22); }
        #nav-msg.state-waiting { background: rgba(234,179,8,0.15); border-color: rgba(234,179,8,0.35); color: #a16207; box-shadow: 0 6px 30px rgba(234,179,8,0.15); }
        #nav-msg.state-waiting .nav-tag { background: rgba(234,179,8,0.22); }

        #exp-msg {
            position: fixed;
            bottom: 90px;
            right: 24px;
            z-index: 200;
            padding: 24px 42px;
            border-radius: 18px;
            background: rgba(124,58,237,0.1);
            border: 2px solid rgba(124,58,237,0.2);
            box-shadow: 0 6px 30px rgba(124,58,237,0.12);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            color: #7c3aed;
            transition: all 0.35s ease;
            opacity: 0;
            transform: translateY(8px);
        }
        #exp-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #exp-msg .exp-tag {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 10px;
            margin-right: 14px;
            vertical-align: middle;
            background: rgba(124,58,237,0.15);
            color: inherit;
        }
        #exp-msg.state-inactive { background: rgba(136,136,160,0.15); border-color: rgba(136,136,160,0.3); color: #8888a0; box-shadow: 0 6px 30px rgba(136,136,160,0.1); }
        #exp-msg.state-inactive .exp-tag { background: rgba(136,136,160,0.2); }
        #exp-msg.state-waiting { background: rgba(234,179,8,0.15); border-color: rgba(234,179,8,0.35); color: #a16207; box-shadow: 0 6px 30px rgba(234,179,8,0.15); }
        #exp-msg.state-waiting .exp-tag { background: rgba(234,179,8,0.22); }
        #exp-msg.state-exploring { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #16a34a; box-shadow: 0 6px 30px rgba(34,197,94,0.15); }
        #exp-msg.state-exploring .exp-tag { background: rgba(34,197,94,0.22); }
        #exp-msg.state-error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.35); color: #dc2626; box-shadow: 0 6px 30px rgba(239,68,68,0.15); }
        #exp-msg.state-error .exp-tag { background: rgba(239,68,68,0.22); }

        #tv-msg {
            position: fixed;
            bottom: 156px;
            right: 24px;
            z-index: 200;
            padding: 24px 42px;
            border-radius: 18px;
            background: rgba(59,130,246,0.1);
            border: 2px solid rgba(59,130,246,0.25);
            box-shadow: 0 6px 30px rgba(59,130,246,0.12);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            color: #3b82f6;
            transition: all 0.35s ease;
            opacity: 0;
            transform: translateY(8px);
        }
        #tv-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #tv-msg .tv-tag {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 10px;
            margin-right: 8px;
            vertical-align: middle;
            background: rgba(59,130,246,0.18);
            color: inherit;
        }
        #tv-msg .tv-val {
            font-variant-numeric: tabular-nums;
        }

        #fr-msg {
            position: fixed;
            bottom: 222px;
            right: 24px;
            z-index: 200;
            padding: 24px 42px;
            border-radius: 18px;
            background: rgba(249,115,22,0.1);
            border: 2px solid rgba(249,115,22,0.25);
            box-shadow: 0 6px 30px rgba(249,115,22,0.12);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            color: #ea580c;
            transition: all 0.35s ease;
            opacity: 0;
            transform: translateY(8px);
        }
        #fr-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #fr-msg .fr-tag {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 10px;
            margin-right: 8px;
            vertical-align: middle;
            background: rgba(249,115,22,0.18);
            color: inherit;
        }
        #fr-msg.state-searching { background: rgba(234,179,8,0.15); border-color: rgba(234,179,8,0.35); color: #a16207; box-shadow: 0 6px 30px rgba(234,179,8,0.15); }
        #fr-msg.state-searching .fr-tag { background: rgba(234,179,8,0.22); }
        #fr-msg.state-tracking { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #16a34a; box-shadow: 0 6px 30px rgba(34,197,94,0.15); }
        #fr-msg.state-tracking .fr-tag { background: rgba(34,197,94,0.22); }
        #fr-msg.state-inactive { background: rgba(136,136,160,0.15); border-color: rgba(136,136,160,0.3); color: #8888a0; box-shadow: 0 6px 30px rgba(136,136,160,0.1); }
        #fr-msg.state-inactive .fr-tag { background: rgba(136,136,160,0.2); }

        .header-action-btn {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(0,0,0,0.03);
            color: #8888a0;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .header-action-btn:hover {
            background: rgba(124,58,237,0.08);
            border-color: rgba(124,58,237,0.25);
            color: #7c3aed;
        }
        .header-action-btn.active {
            background: rgba(34,197,94,0.1);
            border-color: rgba(34,197,94,0.3);
            color: #16a34a;
        }
        .header-action-btn.unstuck-on {
            background: rgba(234,179,8,0.1);
            border-color: rgba(234,179,8,0.3);
            color: #d97706;
        }

        .ws-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .ws-connected { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
        .ws-disconnected { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }

        #graph-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #graph-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }

        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transform: translate(-50%, -50%);
            transition: left 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                        top 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                        opacity 0.4s ease;
            cursor: pointer;
            z-index: 3;
        }

        .node:hover .node-body {
            transform: scale(1.08);
            border-color: #b0b0c4;
        }

        .node-body {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1),
                        border-color 0.3s ease, box-shadow 0.4s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
        }

        .node-body::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 24px;
            background: conic-gradient(from 0deg, transparent, transparent);
            z-index: -1;
            transition: background 0.5s ease;
            opacity: 0;
        }

        .node-active .node-body {
            border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 2px 16px rgba(34, 197, 94, 0.1),
                        inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .node-active .node-body::before {
            background: conic-gradient(from 0deg, rgba(34,197,94,0.4), transparent, transparent, rgba(34,197,94,0.4));
            opacity: 0.4;
        }

        .node-configuring .node-body {
            border-color: rgba(234, 179, 8, 0.3);
            box-shadow: 0 2px 16px rgba(234, 179, 8, 0.08),
                        inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .node-configuring .node-body::before {
            background: conic-gradient(from 0deg, rgba(234,179,8,0.35), transparent, transparent, rgba(234,179,8,0.35));
            opacity: 0.35;
        }

        .node-unconfigured .node-body {
            border-color: rgba(239, 68, 68, 0.2);
            box-shadow: 0 2px 12px rgba(239, 68, 68, 0.06),
                        inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .node-unconfigured .node-body::before {
            background: conic-gradient(from 0deg, rgba(239,68,68,0.25), transparent, transparent, rgba(239,68,68,0.25));
            opacity: 0.25;
        }

        /* NEU: Neutral/Grau Zustand für Nodes ohne Status (Roboclaw & URG Node) */
        .node-neutral .node-body {
            border-color: rgba(140, 140, 150, 0.3);
            box-shadow: 0 2px 12px rgba(140, 140, 150, 0.08),
                        inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .node-neutral .node-body::before {
            background: conic-gradient(from 0deg, rgba(140,140,150,0.2), transparent, transparent, rgba(140,140,150,0.2));
            opacity: 0.2;
        }

        .node-icon {
            width: 30px; height: 30px;
            color: #9898ac;
            transition: color 0.4s ease;
        }
        .node-active .node-icon { color: #16a34a; }
        .node-configuring .node-icon { color: #ca8a04; }
        .node-unconfigured .node-icon { color: #dc2626; }
        .node-neutral .node-icon { color: #8888a0; }

        .led-core {
            width: 16px; height: 16px;
            border-radius: 50%;
            transition: all 0.5s ease;
        }
        .node-active .led-core {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e, 0 0 20px rgba(34,197,94,0.3);
        }
        .node-configuring .led-core {
            background: #eab308;
            box-shadow: 0 0 8px #eab308, 0 0 20px rgba(234,179,8,0.3);
        }
        .node-unconfigured .led-core {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444, 0 0 20px rgba(239,68,68,0.25);
        }
        .node-neutral .led-core {
            background: #8888a0;
            box-shadow: 0 0 8px #8888a0, 0 0 20px rgba(140,140,150,0.2);
        }

        .node-label {
            font-size: 0.958rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 100px;
            word-wrap: break-word;
            line-height: 1.3;
            color: #8888a0;
            transition: color 0.3s;
        }
        .node-active .node-label { color: #15803d; }
        .node-configuring .node-label { color: #a16207; }
        .node-unconfigured .node-label { color: #b91c1c; }
        .node-neutral .node-label { color: #6b6b80; }

        .node-state-badge {
            font-size: 0.948rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 14px;
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .node-active .node-state-badge {
            color: #16a34a;
            border-color: rgba(34,197,94,0.2);
            background: rgba(34,197,94,0.06);
        }
        .node-configuring .node-state-badge {
            color: #ca8a04;
            border-color: rgba(234,179,8,0.2);
            background: rgba(234,179,8,0.06);
        }
        .node-unconfigured .node-state-badge {
            color: #dc2626;
            border-color: rgba(239,68,68,0.15);
            background: rgba(239,68,68,0.04);
        }
        .node-neutral .node-state-badge {
            color: #6b6b80;
            border-color: rgba(140,140,150,0.2);
            background: rgba(140,140,150,0.08);
        }

        .pulse-ring {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 22px;
            border: 1px solid transparent;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .node-active .pulse-ring {
            border-color: rgba(34,197,94,0.2);
            animation: pulse-expand 3s ease-in-out infinite;
        }
        .node-configuring .pulse-ring {
            border-color: rgba(234,179,8,0.2);
            animation: pulse-expand 2s ease-in-out infinite;
        }

        @keyframes pulse-expand {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .node:active .node-body {
            transform: scale(0.92);
            transition: transform 0.06s ease;
        }

        .node-click-flash {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            pointer-events: none;
            z-index: 10;
        }
        .node-click-flash .ring {
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            border: 2px solid rgba(100, 140, 255, 0.6);
            opacity: 0;
        }
        .node-click-flash .burst {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: rgba(100, 140, 255, 0.25);
            opacity: 0;
        }
        .node-click-flash.animate .ring { animation: click-ring 0.6s ease-out forwards; }
        .node-click-flash.animate .burst { animation: click-burst 0.35s ease-out forwards; }
        .node-click-flash.animate .ring:nth-child(2) { animation-delay: 0.08s; }
        .node-click-flash.animate .ring:nth-child(3) { animation-delay: 0.16s; }

        @keyframes click-ring {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.8); }
        }
        @keyframes click-burst {
            0%   { opacity: 1; transform: scale(1); }
            50%  { opacity: 0.5; transform: scale(1.04); }
            100% { opacity: 0; transform: scale(1); }
        }

        #no-data {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            color: #aaa;
            font-size: 0.985rem;
            letter-spacing: 1px;
        }

        #map-panel {
            position: fixed;
            bottom: 16px;
            left: 16px;
            width: min(280px, 40vw);
            height: min(280px, 40vw);
            border-radius: 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 4px 24px rgba(0,0,0,0.07),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            z-index: 6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            opacity: 0;
            transform: scale(0.92);
            transform-origin: bottom left;
            transition: opacity 0.4s ease,
                        transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-radius 0.35s ease,
                        box-shadow 0.4s ease;
            pointer-events: none;
        }
        #map-panel.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        #map-panel.expanding {
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        top 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        left 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        width 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        height 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        border-radius 0.5s ease,
                        box-shadow 0.5s ease;
        }
        #map-panel.expanded {
            bottom: 100px; left: 100px;
            width: calc(100vw - 200px);
            height: calc(100vh - 200px);
            border-radius: 20px;
            z-index: 100;
            border-color: rgba(0,0,0,0.08);
            box-shadow: 0 12px 48px rgba(0,0,0,0.12),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            transform: scale(1);
        }
        #map-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.18);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        }
        .map-expand-btn:hover {
            border-color: rgba(0,0,0,0.15);
            color: #555;
            background: rgba(0,0,0,0.05);
        }
        .map-expand-btn svg {
            width: 13px;
            height: 13px;
        }
        .map-fetch-btn {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 7px;
            height: 26px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8888a0;

            font-size: 0.72rem;

        .map-fetch-btn:hover {
            border-color: rgba(34,197,94,0.3);

        .map-fetch-btn.loading {

        #map-panel .map-body {

        #map-panel canvas {

        #map-panel .map-placeholder {

        }

        @media (max-width: 600px) {
            #map-panel { width: 100%; max-height: 35vh; }

    </style>
</head>
<body>

<div class="grid-bg"></div>

<div id="header">
    <h1>Node Status Graph</h1>
    <div class="slam-stats">
        <span class="slam-stat confidence">Confidence <span class="val" id="stat-confidence">--</span></span>
        <span class="slam-stat frontier">Frontier <span class="val" id="stat-frontier">--</span></span>

    </div>
    <div style="display:flex;align-items:center;gap:8px;">
        <button id="btn-auto" class="header-action-btn" onclick="sendCommand({action:'launch',target:'sequential_start'})">AUTO</button>
        <button id="btn-unstuck" class="header-action-btn" onclick="sendCommand({action:'toggle',target:'unstuck'})">UNSTUCK</button>
        <div class="ws-status">
            <span id="ws-dot" class="ws-dot ws-disconnected"></span>

    </div>
</div>

<div id="tv-msg">

</div>

</div>

<svg id="graph-canvas"></svg>
<div id="graph-container"></div>
<div id="map-backdrop"></div>
<div id="map-panel">
    <div class="map-header">
        SLAM Map
        <div style="display:flex;gap:6px;align-items:center;">
            <button class="map-fetch-btn" id="map-fetch-btn" title="Fetch map">Fetch</button>
            <button class="map-expand-btn" id="map-expand-btn" title="Expand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"/>
                    <polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/>
                    <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="map-body">
        <div class="map-placeholder" id="map-placeholder">
            No map received
            <div class="map-status" id="map-status">waiting for map data...</div>
        </div>
        <canvas id="map-canvas"></canvas>
    </div>
</div>
<div id="no-data">Waiting for node data...</div>

<script>
    const wsDot = document.getElementById('ws-dot');
    const wsText = document.getElementById('ws-text');
    const container = document.getElementById('graph-container');
    const svg = document.getElementById('graph-canvas');
    const noData = document.getElementById('no-data');
    const mapPanel = document.getElementById('map-panel');
    const mapCanvas = document.getElementById('map-canvas');
    const mapPlaceholder = document.getElementById('map-placeholder');
    const mapStatus = document.getElementById('map-status');
    const mapCtx = mapCanvas.getContext('2d');

    let nodesData = {};
    let nodeElements = {};
    let isSequentialMode = false;
    let unstuckState = false;
    let buttonStates = {};
    let mapInfo = null;
    let mapImage = null;
    let robotPose = null;
    let plannedPath = null;
    let goalPose = null;
    let mapTransform = null;

    function getStateClass(state) {
        const s = state.toLowerCase();
        if (s.includes('active')) return 'node-active';
        if (s.includes('configur')) return 'node-configuring';
        return 'node-unconfigured';
    }

    // Verbesserter Filter: Verhindert Überlappung bei "slam_toolbox"
    function getShortName(name) {
        if (name.toLowerCase().includes('slam')) return 'slam';
        let parts = name.split('/');
        let last = parts[parts.length - 1] || parts[parts.length - 2];
        return last.replace(/_/g, '\n');
    }

    // Koordinaten korrigiert: Mehr Abstand (Gap) zwischen collision_avoidance und roboclaw
    const TOPOLOGY = {
        'urg_node_2':              { x: 0.6, y: 0.18 },
        'slam':                    { x: 0.4, y: 0.18 },
        'exploration':             { x: 0.3, y: 0.36 },
        'follow_red':              { x: 0.5, y: 0.36 },
        'navigation':              { x: 0.4, y: 0.54 },
        'blind_exploration':       { x: 0.6, y: 0.54 },
        'collision_avoidance':     { x: 0.50, y: 0.72 },
        'roboclaw':                { x: 0.50, y: 0.92 }, // Erhöhter Abstand verhindert Überlappung
    };

    const EDGES = [
        ['slam', 'navigation'],
        ['slam', 'exploration'],
        ['urg_node_2', 'slam'],
        ['urg_node_2', 'blind_exploration'],
        ['exploration', 'navigation'],
        ['follow_red', 'navigation'],
        ['navigation', 'collision_avoidance'],
        ['blind_exploration', 'collision_avoidance'],
        ['collision_avoidance', 'roboclaw'],
    ];

    const TOPOLOGY_KEYS = Object.keys(TOPOLOGY).sort((a, b) => b.length - a.length);

    function matchTopologyKey(nodeName) {
        const lower = nodeName.toLowerCase();
        for (const key of TOPOLOGY_KEYS) {
            if (lower.includes(key)) return key;
        }
        return null;
    }

    function renderGraph() {
        const allKeys = Object.keys(nodesData);

        if (allKeys.length === 0) {
            noData.style.display = 'block';
            return;
        }
        noData.style.display = 'none';

        const w = window.innerWidth;
        const h = window.innerHeight;
        const topBar = 55;

        const positions = {};
        const unmatched = [];

        for (const key of allKeys) {
            const topoKey = matchTopologyKey(key);
            if (topoKey && TOPOLOGY[topoKey]) {
                const t = TOPOLOGY[topoKey];
                positions[key] = {
                    x: t.x * w,
                    y: topBar + t.y * (h - topBar)
                };
            } else {
                unmatched.push(key);
            }
        }

        if (unmatched.length > 0) {
            const startX = 0.15;
            const spacing = 0.12;
            unmatched.forEach((key, i) => {
                positions[key] = {
                    x: (startX + i * spacing) * w,
                    y: 0.55 * h
                };
            });
        }

        const edgeMap = {};
        for (const key of allKeys) edgeMap[key] = true;

        let svgContent = '<defs>' +
            '<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"' +
            ' markerWidth="7" markerHeight="7" orient="auto-start-reverse">' +
            '<path d="M 0 1 L 8 5 L 0 9 z" fill="#c0c0d0"/>' +
            '</marker>' +
            '<marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5"' +
            ' markerWidth="7" markerHeight="7" orient="auto-start-reverse">' +
            '<path d="M 0 1 L 8 5 L 0 9 z" fill="#22c55e"/>' +
            '</marker>' +
            '<filter id="glow">' +
            '<feGaussianBlur stdDeviation="2" result="blur"/>' +
            '<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>' +
            '</filter>' +
            '</defs>';

        for (const [from, to] of EDGES) {
            const fromKey = allKeys.find(k => matchTopologyKey(k) === from);
            const toKey = allKeys.find(k => matchTopologyKey(k) === to);
            if (!fromKey || !toKey) continue;
            if (!positions[fromKey] || !positions[toKey]) continue;

            const pa = positions[fromKey];
            const pb = positions[toKey];

            const stateFrom = nodesData[fromKey]?.toLowerCase() || '';
            const stateTo = nodesData[toKey]?.toLowerCase() || '';
            const isActive = stateFrom.includes('active') && stateTo.includes('active');
            const isConfiguring = stateFrom.includes('configur') && stateTo.includes('configur');

            let strokeColor = '#d0d0dc';
            let markerRef = 'url(#arrow)';
            let strokeW = 1.5;
            if (isActive) {
                strokeColor = 'rgba(34, 197, 94, 0.4)';
                markerRef = 'url(#arrow-active)';
                strokeW = 2;
            } else if (isConfiguring) {
                strokeColor = 'rgba(234, 179, 8, 0.3)';
                strokeW = 1.8;
            }

            const dx = pb.x - pa.x;
            const dy = pb.y - pa.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = dx / len;
            const ny = dy / len;
            const rStart = 48;
            const rEnd = 78;
            const x1 = pa.x + nx * rStart;
            const y1 = pa.y + ny * rStart;
            const x2 = pb.x - nx * rEnd;
            const y2 = pb.y - ny * rEnd;

            svgContent += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '"' +
                ' stroke="' + strokeColor + '" stroke-width="' + strokeW + '"' +
                ' marker-end="' + markerRef + '" filter="url(#glow)"' +
                ' stroke-linecap="round"/>';
        }

        svg.innerHTML = svgContent;

        for (const key of allKeys) {
            const state = nodesData[key];
            let stateClass = getStateClass(state);
            let badgeText = (state || 'OFFLINE').toUpperCase();
            
            const topoKey = matchTopologyKey(key);
            const pos = positions[key];
            if (!pos) continue;

            // Logik-Injection: Mache statuslose Nodes (Roboclaw und URG) permanent neutral/grau
            if (topoKey === 'urg_node_2' || topoKey === 'roboclaw') {
                stateClass = 'node-neutral';
                badgeText = 'N/A';
            }

            if (nodeElements[key]) {
                const el = nodeElements[key];
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                el.className = 'node ' + stateClass;
                const badgeEl = el.querySelector('.node-state-badge');
                badgeEl.textContent = badgeText;
            } else {
                const isSlam = topoKey === 'slam';
                const isRoboclaw = topoKey === 'roboclaw';
                const isUrg = topoKey === 'urg_node_2';
                const icon = isSlam
                    ? '<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                      '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>' +
                      '<line x1="8" y1="2" x2="8" y2="18"/>' +
                      '<line x1="16" y1="6" x2="16" y2="22"/>' +
                      '</svg>'
                    : isRoboclaw
                    ? '<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                      '<circle cx="12" cy="12" r="10"/>' +
                      '<circle cx="12" cy="12" r="3"/>' +
                      '<line x1="12" y1="2" x2="12" y2="5"/>' +
                      '<line x1="12" y1="19" x2="12" y2="22"/>' +
                      '<line x1="2" y1="12" x2="5" y2="12"/>' +
                      '<line x1="19" y1="12" x2="22" y2="12"/>' +
                      '</svg>'
                    : isUrg
                    ? '<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                      '<circle cx="12" cy="12" r="10"/>' +
                      '<circle cx="12" cy="12" r="8"/>' +
                      '<line x1="12" y1="4" x2="12" y2="8"/>' +
                      '<line x1="12" y1="16" x2="12" y2="20"/>' +
                      '<line x1="4" y1="12" x2="8" y2="12"/>' +
                      '<line x1="16" y1="12" x2="20" y2="12"/>' +
                      '</svg>'
                    : '<div class="led-core"></div>';

                const el = document.createElement('div');
                el.className = 'node ' + stateClass;
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                el.style.opacity = '0';
                
                el.innerHTML =
                    '<div class="node-body">' +
                        '<div class="node-click-flash">' +
                            '<div class="ring"></div>' +
                            '<div class="ring"></div>' +
                            '<div class="ring"></div>' +
                            '<div class="burst"></div>' +
                        '</div>' +
                        '<div class="pulse-ring"></div>' +
                        icon +
                    '</div>' +
                    '<div class="node-label">' + getShortName(key) + '</div>' +
                    '<div class="node-state-badge">' + badgeText + '</div>';
                if (topoKey) {
                    el.addEventListener('click', () => {
                        sendCommand({ action: 'launch', target: topoKey });
                        const flash = el.querySelector('.node-click-flash');
                        flash.classList.remove('animate');
                        void flash.offsetWidth;
                        flash.classList.add('animate');
                    });
                }
                container.appendChild(el);
                nodeElements[key] = el;
                requestAnimationFrame(() => { el.style.opacity = '1'; });
            }
        }

        for (const key of Object.keys(nodeElements)) {
            if (!allKeys.includes(key)) {
                nodeElements[key].style.opacity = '0';
                setTimeout(() => {
                    nodeElements[key]?.remove();
                    delete nodeElements[key];
                }, 400);
            }
        }
    }

    function worldToPixel(wx, wy) {
        if (!mapInfo || !mapTransform) return null;
        const res = mapInfo.resolution;
        const ox = mapInfo.origin_x;
        const oy = mapInfo.origin_y;
        const gw = mapInfo.width;
        const gh = mapInfo.height;

        const gridX = (wx - ox) / res;
        const gridY = (wy - oy) / res;

        return {
            x: mapTransform.offsetX + gridX * mapTransform.scale,
            y: mapTransform.offsetY + (gh - 1 - gridY) * mapTransform.scale
        };
    }

    function pixelToWorld(px, py) {
        if (!mapInfo || !mapTransform) return null;
        const res = mapInfo.resolution;
        const ox = mapInfo.origin_x;
        const oy = mapInfo.origin_y;
        const gw = mapInfo.width;
        const gh = mapInfo.height;

        const gridX = (px - mapTransform.offsetX) / mapTransform.scale;
        const gridY = gh - 1 - (py - mapTransform.offsetY) / mapTransform.scale;

        return { x: ox + gridX * res, y: oy + gridY * res };
    }

    function decodeMap(payload) {
        const binary = atob(payload.data_b64 || '');
        const cells = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) cells[i] = binary.charCodeAt(i);
        const w = payload.width, h = payload.height;
        const imageData = mapCtx.createImageData(w, h);
        const pixels = imageData.data;
        for (let i = 0; i < cells.length; i++) {
            const val = cells[i];
            const gx = i % w;
            const gy = Math.floor(i / w);
            const py = (h - 1 - gy) * w + gx;
            const p = py * 4;
            if (val === 0) {
                pixels[p] = 255; pixels[p+1] = 255; pixels[p+2] = 255; pixels[p+3] = 255;
            } else if (val === 255) {
                pixels[p] = 0; pixels[p+1] = 0; pixels[p+2] = 0; pixels[p+3] = 0;
            } else if (val >= 100) {
                pixels[p] = 20; pixels[p+1] = 20; pixels[p+2] = 25; pixels[p+3] = 255;
            } else {
                const t = val / 100;
                pixels[p] = Math.round(60 - t*40);
                pixels[p+1] = Math.round(60 - t*40);
                pixels[p+2] = Math.round(65 - t*40);
                pixels[p+3] = Math.round(200 + t*55);
            }
        }
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = w; tmpCanvas.height = h;
        tmpCanvas.getContext('2d').putImageData(imageData, 0, 0);
        const img = new Image();
        img.onload = () => { mapImage = img; drawMap(); };
        img.src = tmpCanvas.toDataURL();
    }

    function drawMap() {
        if (!mapImage || !mapInfo) return;
        const body = document.querySelector('#map-panel .map-body');
        const rect = body.getBoundingClientRect();
        const cw = rect.width, ch = rect.height;
        if (cw === 0 || ch === 0) return;
        const dpr = window.devicePixelRatio || 1;
        const bufW = Math.round(cw * dpr);
        const bufH = Math.round(ch * dpr);
        mapCanvas.width = bufW; mapCanvas.height = bufH;
        mapCanvas.style.width = cw + 'px'; mapCanvas.style.height = ch + 'px';
        const gw = mapInfo.width, gh = mapInfo.height;
        const scale = Math.min(bufW / gw, bufH / gh);
        const offsetX = (bufW - gw * scale) / 2;
        const offsetY = (bufH - gh * scale) / 2;
        mapTransform = { scale, offsetX, offsetY };
        mapCtx.clearRect(0, 0, bufW, bufH);
        mapCtx.imageSmoothingEnabled = true;
        mapCtx.imageSmoothingQuality = 'high';
        mapCtx.drawImage(mapImage, offsetX, offsetY, gw * scale, gh * scale);

        if (goalPose) {
            const p = worldToPixel(goalPose.x, goalPose.y);
            if (p) {
                const gyaw = 2 * Math.atan2(goalPose.qz, goalPose.qw);
                mapCtx.save(); mapCtx.translate(p.x, p.y); mapCtx.rotate(-gyaw);
                const s = Math.max(6, scale * 0.12);
                mapCtx.beginPath(); mapCtx.arc(0, 0, s, 0, Math.PI * 2);
                mapCtx.fillStyle = 'rgba(231, 76, 60, 0.85)'; mapCtx.fill();
                mapCtx.strokeStyle = '#fff'; mapCtx.lineWidth = 2; mapCtx.stroke();
                mapCtx.beginPath();
                mapCtx.moveTo(0, -s*1.6); mapCtx.lineTo(-s*0.7, s*0.4); mapCtx.lineTo(s*0.7, s*0.4);
                mapCtx.closePath(); mapCtx.fillStyle = 'rgba(231, 76, 60, 0.7)'; mapCtx.fill();
                mapCtx.restore();
            }
        }

        if (plannedPath && plannedPath.length > 1) {
            mapCtx.beginPath();
            const first = worldToPixel(plannedPath[0].x, plannedPath[0].y);
            if (first) {
                mapCtx.moveTo(first.x, first.y);
                for (let i = 1; i < plannedPath.length; i++) {
                    const pp = worldToPixel(plannedPath[i].x, plannedPath[i].y);
                    if (pp) mapCtx.lineTo(pp.x, pp.y);
                }
            }
            mapCtx.strokeStyle = 'rgba(52, 152, 219, 0.85)';
            mapCtx.lineWidth = Math.max(2, scale * 0.2);
            mapCtx.lineCap = 'round'; mapCtx.lineJoin = 'round';
            mapCtx.setLineDash([scale * 0.3, scale * 0.15]);
            mapCtx.stroke(); mapCtx.setLineDash([]);
        }

        if (robotPose) {
            const p = worldToPixel(robotPose.x, robotPose.y);
            if (p) {
                const ryaw = 2 * Math.atan2(robotPose.qz, robotPose.qw);
                mapCtx.save(); mapCtx.translate(p.x, p.y); mapCtx.rotate(-ryaw);
                const r = Math.max(4, scale * 0.12);
                mapCtx.beginPath(); mapCtx.arc(0, 0, r, 0, Math.PI * 2);
                mapCtx.fillStyle = 'rgba(39, 174, 96, 0.9)'; mapCtx.fill();
                mapCtx.strokeStyle = '#fff'; mapCtx.lineWidth = 1.5; mapCtx.stroke();
                mapCtx.beginPath();
                mapCtx.moveTo(0, -r*1.5); mapCtx.lineTo(-r*0.8, r*0.6); mapCtx.lineTo(r*0.8, r*0.6);
                mapCtx.closePath(); mapCtx.fillStyle = 'rgba(39, 174, 96, 0.7)'; mapCtx.fill();
                mapCtx.restore();
            }
        }
    }

    mapCanvas.addEventListener('click', function(e) {
        if (!mapInfo || !mapTransform) return;
        const dpr = window.devicePixelRatio || 1;
        const bodyRect = document.querySelector('#map-panel .map-body').getBoundingClientRect();
        const px = (e.clientX - bodyRect.left) * dpr;
        const py = (e.clientY - bodyRect.top) * dpr;
        const world = pixelToWorld(px, py);
        if (!world) return;
        sendCommand({ action: 'navigate', x: +world.x.toFixed(3), y: +world.y.toFixed(3) });
    });

    const mapExpandBtn = document.getElementById('map-expand-btn');
    const mapFetchBtn = document.getElementById('map-fetch-btn');
    const mapBackdrop = document.getElementById('map-backdrop');
    let mapExpanded = false;

    function toggleMapExpand() {
        mapExpanded = !mapExpanded;
        mapPanel.classList.add('expanding');
        if (mapExpanded) {
            const rect = mapPanel.getBoundingClientRect();
            const targetW = window.innerWidth - 32;
            const targetH = window.innerHeight - 32;
            const ratio = Math.min(rect.width / targetW, rect.height / targetH);
            mapPanel.classList.add('expanded');
            mapPanel.style.transform = 'scale(' + ratio + ')';
            mapBackdrop.classList.add('visible');
            void mapPanel.offsetHeight;
            mapPanel.style.transform = '';
        } else {
            const rect = mapPanel.getBoundingClientRect();
            const smallW = Math.min(280, window.innerWidth * 0.4);
            const smallH = Math.min(280, window.innerHeight * 0.4);
            const ratio = Math.min(smallW / rect.width, smallH / rect.height);
            mapPanel.style.transformOrigin = 'bottom left';
            mapPanel.style.transform = 'scale(' + ratio + ')';
            mapBackdrop.classList.remove('visible');
            const onEnd = () => {
                mapPanel.classList.remove('expanded', 'expanding');
                mapPanel.style.transform = '';
                mapPanel.style.transformOrigin = '';
                mapPanel.removeEventListener('transitionend', onEnd);
                drawMap();
            };
            mapPanel.addEventListener('transitionend', onEnd);
        }
        mapExpandBtn.innerHTML = mapExpanded
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
        if (mapExpanded) setTimeout(drawMap, 520);
    }

    mapExpandBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMapExpand(); });
    mapBackdrop.addEventListener('click', () => { if (mapExpanded) toggleMapExpand(); });

    const mapBody = document.querySelector('#map-panel .map-body');
    const resizeObs = new ResizeObserver(() => { drawMap(); });
    resizeObs.observe(mapBody);

    async function sendCommand(payload) {
        try {
            const response = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            return await response.json();
        } catch (error) {
            return { ok: false };
        }
    }

    let mapFetching = false;
    async function fetchMap() {
        if (mapFetching) return;
        mapFetching = true;
        mapFetchBtn.classList.add('loading');
        mapFetchBtn.textContent = '...';
        try {
            const resp = await fetch('/api/map');
            const data = await resp.json();
            if (data && data.width) {
                mapInfo = data;
                decodeMap(data);
                mapPanel.classList.add('visible');
                mapPlaceholder.classList.add('hidden');
                mapStatus.textContent = data.width + 'x' + data.height + ' | res: ' + data.resolution + 'm';
                drawMap();
            }
        } catch (e) {
            mapStatus.textContent = 'fetch failed';
        } finally {
            mapFetching = false;
            mapFetchBtn.classList.remove('loading');
            mapFetchBtn.textContent = 'Fetch';
        }
    }

    mapFetchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fetchMap();
    });

    function connect() {
        const source = new EventSource('/events');
        source.addEventListener('state', (event) => {
            try {
                const snapshot = JSON.parse(event.data);

                wsDot.className = 'ws-dot ws-connected';
                wsText.textContent = 'CONNECTED';
                wsText.style.color = '#16a34a';

                const bs = snapshot.button_states || {};
                buttonStates = bs;
                isSequentialMode = bs.sequential_start === true;
                unstuckState = bs.unstuck === true;
                document.getElementById('btn-auto').classList.toggle('active', isSequentialMode);
                document.getElementById('btn-unstuck').classList.toggle('unstuck-on', unstuckState);

                nodesData = snapshot.node_states || {};

                const sm = snapshot.slam_metrics || {};
                document.getElementById('stat-confidence').textContent =
                    sm.confidence !== undefined ? (sm.confidence * 100).toFixed(1) + '%' : '--';
                document.getElementById('stat-frontier').textContent =
                    sm.frontier_ratio !== undefined ? (sm.frontier_ratio * 100).toFixed(1) + '%' : '--';
                document.getElementById('stat-growth').textContent =
                    sm.growth_ratio !== undefined ? (sm.growth_ratio * 100).toFixed(1) + '%' : '--';

                const navStatus = snapshot.navigation_status;
                const navMsg = document.getElementById('nav-msg');
                const navTag = document.getElementById('nav-tag');
                const navValue = document.getElementById('nav-status-value');
                navValue.textContent = navStatus ? navStatus.toUpperCase() : '--';
                navMsg.className = navStatus ? 'visible' : '';
                if (navStatus) {
                    const ns = navStatus.toLowerCase();
                    if (ns === 'tracking') navMsg.classList.add('state-tracking');
                    else if (ns === 'planning') navMsg.classList.add('state-planning');
                    else if (ns === 'goal_succeeded') navMsg.classList.add('state-success');
                    else if (ns === 'idle') navMsg.classList.add('state-idle');
                    else if (ns === 'stuck' || ns === 'no_path' || ns === 'outside_map') navMsg.classList.add('state-error');
                    else if (ns.startsWith('waiting')) navMsg.classList.add('state-waiting');
                    else navMsg.classList.add('state-idle');
                }

                const expStatus = snapshot.exploration_status;
                const expMsg = document.getElementById('exp-msg');
                const expTag = document.getElementById('exp-tag');
                const expValue = document.getElementById('exp-status-value');
                expValue.textContent = expStatus ? expStatus.toUpperCase() : '--';
                expMsg.className = expStatus ? 'visible' : '';
                if (expStatus) {
                    const es = expStatus.toLowerCase();
                    if (es === 'exploring') expMsg.classList.add('state-exploring');
                    else if (es.startsWith('waiting')) expMsg.classList.add('state-waiting');
                    else if (es === 'no position found') expMsg.classList.add('state-error');
                    else expMsg.classList.add('state-inactive');
                }

                const tv = snapshot.target_vector;
                const tvMsg = document.getElementById('tv-msg');
                const tvValue = document.getElementById('tv-value');
                if (tv) {
                    tvValue.textContent = 'L: ' + tv.linear.toFixed(3) + '  A: ' + tv.angular.toFixed(3);
                    tvMsg.className = 'visible';
                } else {
                    tvMsg.className = '';
                }

                const frStatus = snapshot.follow_red_status;
                const frMsg = document.getElementById('fr-msg');
                const frValue = document.getElementById('fr-status-value');
                frValue.textContent = frStatus ? frStatus.toUpperCase() : '--';
                frMsg.className = frStatus ? 'visible' : '';
                if (frStatus) {
                    frMsg.classList.remove('state-searching', 'state-tracking', 'state-inactive');
                    const fs = frStatus.toLowerCase();
                    if (fs.includes('searching')) frMsg.classList.add('state-searching');
                    else if (fs.includes('tracking') || fs.includes('goal_pose')) frMsg.classList.add('state-tracking');
                    else frMsg.classList.add('state-inactive');
                }

                if (snapshot.map_dirty) {
                    fetchMap();
                }

                robotPose = snapshot.robot_pose || null;
                plannedPath = snapshot.path || null;
                goalPose = snapshot.goal || null;

                renderGraph();
                drawMap();
            } catch (e) {
                console.error('State parse error:', e);
            }
        });
        source.onerror = () => {
            wsDot.className = 'ws-dot ws-disconnected';
            wsText.textContent = 'DISCONNECTED';
            wsText.style.color = '#dc2626';
            mapStatus.textContent = 'disconnected';
            source.close();
            setTimeout(connect, 1500);
        };
    }

    window.addEventListener('resize', renderGraph);
    connect();
</script>
</body>
</html>

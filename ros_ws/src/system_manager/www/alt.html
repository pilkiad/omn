<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Status Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f2f3f7;
            color: #2d2d3a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(circle at 1px 1px, #dcdce4 1px, transparent 0);
            background-size: 36px 36px;
            opacity: 0.5;
        }

        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 1px 6px rgba(0,0,0,0.04);
        }

        #header h1 {
            font-size: 0.985rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #6b6b80;
            text-transform: uppercase;
        }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.97rem;
            font-weight: 600;
            letter-spacing: 1.2px;
        }

        .ws-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .ws-connected { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
        .ws-disconnected { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }

        #graph-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #graph-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
        }

        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transform: translate(-50%, -50%);
            transition: left 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                        top 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                        opacity 0.4s ease;
            cursor: pointer;
            z-index: 3;
        }

        .node:hover .node-body {
            transform: scale(1.08);
            border-color: #b0b0c4;
        }

        .node-body {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1),
                        border-color 0.3s ease, box-shadow 0.4s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
        }

        .node-body::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 24px;
            background: conic-gradient(from 0deg, transparent, transparent);
            z-index: -1;
            transition: background 0.5s ease;
            opacity: 0;
        }

        .node-active .node-body {
            border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 2px 16px rgba(34, 197, 94, 0.1),
                        inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .node-active .node-body::before {
            background: conic-gradient(from 0deg, rgba(34,197,94,0.4), transparent, transparent, rgba(34,197,94,0.4));
            opacity: 0.4;
        }

        .node-configuring .node-body {
            border-color: rgba(234, 179, 8, 0.3);
            box-shadow: 0 2px 16px rgba(234, 179, 8, 0.08),
                        inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .node-configuring .node-body::before {
            background: conic-gradient(from 0deg, rgba(234,179,8,0.35), transparent, transparent, rgba(234,179,8,0.35));
            opacity: 0.35;
        }

        .node-unconfigured .node-body {
            border-color: rgba(239, 68, 68, 0.2);
            box-shadow: 0 2px 12px rgba(239, 68, 68, 0.06),
                        inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .node-unconfigured .node-body::before {
            background: conic-gradient(from 0deg, rgba(239,68,68,0.25), transparent, transparent, rgba(239,68,68,0.25));
            opacity: 0.25;
        }

        .node-icon {
            width: 30px; height: 30px;
            color: #9898ac;
            transition: color 0.4s ease;
        }
        .node-active .node-icon { color: #16a34a; }
        .node-configuring .node-icon { color: #ca8a04; }
        .node-unconfigured .node-icon { color: #dc2626; }

        .led-core {
            width: 16px; height: 16px;
            border-radius: 50%;
            transition: all 0.5s ease;
        }
        .node-active .led-core {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e, 0 0 20px rgba(34,197,94,0.3);
        }
        .node-configuring .led-core {
            background: #eab308;
            box-shadow: 0 0 8px #eab308, 0 0 20px rgba(234,179,8,0.3);
        }
        .node-unconfigured .led-core {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444, 0 0 20px rgba(239,68,68,0.25);
        }

        .node-label {
            font-size: 0.958rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 100px;
            word-wrap: break-word;
            line-height: 1.3;
            color: #8888a0;
            transition: color 0.3s;
        }
        .node-active .node-label { color: #15803d; }
        .node-configuring .node-label { color: #a16207; }
        .node-unconfigured .node-label { color: #b91c1c; }

        .node-state-badge {
            font-size: 0.948rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 14px;
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .node-active .node-state-badge {
            color: #16a34a;
            border-color: rgba(34,197,94,0.2);
            background: rgba(34,197,94,0.06);
        }
        .node-configuring .node-state-badge {
            color: #ca8a04;
            border-color: rgba(234,179,8,0.2);
            background: rgba(234,179,8,0.06);
        }
        .node-unconfigured .node-state-badge {
            color: #dc2626;
            border-color: rgba(239,68,68,0.15);
            background: rgba(239,68,68,0.04);
        }


        .node-seq-start .node-body {
            width: auto;
            height: auto;
            padding: 12px 22px;
            border-radius: 24px;
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.2);
            color: #2d2d3a;
            gap: 8px;
            flex-direction: row;
            box-shadow: 0 2px 14px rgba(124, 58, 237, 0.08),
                        inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .node-seq-start .node-body::before { display: none; }
        .node-seq-start:hover .node-body {
            border-color: rgba(124, 58, 237, 0.35);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.12);
            transform: scale(1.04);
        }
        .node-seq-start .node-icon { width: 18px; height: 18px; color: #7c3aed; }
        .node-seq-start .node-label {
            color: #6d28d9;
            font-size: 0.962rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .node-seq-start .node-state-badge { display: none; }
        .node-seq-start .pulse-ring { display: none; }

        .node-seq-start.seq-running .node-body {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 2px 18px rgba(34, 197, 94, 0.12),
                        0 0 40px rgba(34, 197, 94, 0.04);
            animation: seq-pulse-glow 2.5s ease-in-out infinite;
        }
        .node-seq-start.seq-running .node-icon { color: #16a34a; }
        .node-seq-start.seq-running .node-label { color: #15803d; }

        @keyframes seq-pulse-glow {
            0%, 100% { box-shadow: 0 2px 18px rgba(34,197,94,0.12), 0 0 40px rgba(34,197,94,0.04); }
            50%      { box-shadow: 0 4px 24px rgba(34,197,94,0.2), 0 0 50px rgba(34,197,94,0.08); }
        }

        .pulse-ring {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 22px;
            border: 1px solid transparent;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .node-active .pulse-ring {
            border-color: rgba(34,197,94,0.2);
            animation: pulse-expand 3s ease-in-out infinite;
        }
        .node-configuring .pulse-ring {
            border-color: rgba(234,179,8,0.2);
            animation: pulse-expand 2s ease-in-out infinite;
        }

        @keyframes pulse-expand {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .node:active .node-body {
            transform: scale(0.92);
            transition: transform 0.06s ease;
        }

        .node-click-flash {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            pointer-events: none;
            z-index: 10;
        }
        .node-click-flash .ring {
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            border: 2px solid rgba(100, 140, 255, 0.6);
            opacity: 0;
        }
        .node-click-flash .burst {
            position: absolute;
            inset: 0;
            border-radius: 22px;
            background: rgba(100, 140, 255, 0.25);
            opacity: 0;
        }
        .node-click-flash.animate .ring { animation: click-ring 0.6s ease-out forwards; }
        .node-click-flash.animate .burst { animation: click-burst 0.35s ease-out forwards; }
        .node-click-flash.animate .ring:nth-child(2) { animation-delay: 0.08s; }
        .node-click-flash.animate .ring:nth-child(3) { animation-delay: 0.16s; }

        @keyframes click-ring {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.8); }
        }
        @keyframes click-burst {
            0%   { opacity: 1; transform: scale(1); }
            50%  { opacity: 0.5; transform: scale(1.04); }
            100% { opacity: 0; transform: scale(1); }
        }

        #no-data {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            color: #aaa;
            font-size: 0.985rem;
            letter-spacing: 1px;
        }

        .seq-banner {
            position: fixed;
            top: 52px; left: 0; right: 0;
            z-index: 9;
            text-align: center;
            padding: 8px 0;
            font-size: 0.965rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7c3aed;
            background: rgba(124, 58, 237, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.12);
            transform: translateY(-100%);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease;
            pointer-events: none;
        }
        .seq-banner.visible {
            transform: translateY(0);
            opacity: 1;
        }

        #map-panel {
            position: fixed;
            bottom: 16px;
            left: 16px;
            width: min(280px, 40vw);
            height: min(280px, 40vw);
            border-radius: 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 4px 24px rgba(0,0,0,0.07),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            z-index: 6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            opacity: 0;
            transform: scale(0.92);
            transform-origin: bottom left;
            transition: opacity 0.4s ease,
                        transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-radius 0.35s ease,
                        box-shadow 0.4s ease;
            pointer-events: none;
        }
        #map-panel.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        #map-panel.expanding {
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        top 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        left 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        width 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        height 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        border-radius 0.5s ease,
                        box-shadow 0.5s ease;
        }
        #map-panel.expanded {
            bottom: 100px; left: 100px;
            width: calc(100vw - 200px);
            height: calc(100vh - 200px);
            border-radius: 20px;
            z-index: 100;
            border-color: rgba(0,0,0,0.08);
            box-shadow: 0 12px 48px rgba(0,0,0,0.12),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            transform: scale(1);
        }
        #map-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.18);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #map-backdrop.visible {
            opacity: 0.8;
            pointer-events: auto;
        }
        #map-panel .map-header {
            padding: 10px 14px 6px;
            font-size: 0.952rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8888a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .map-expand-btn {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 7px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8888a0;
            transition: all 0.2s ease;
        }
        .map-expand-btn:hover {
            border-color: rgba(0,0,0,0.15);
            color: #555;
            background: rgba(0,0,0,0.05);
        }
        .map-expand-btn svg {
            width: 13px;
            height: 13px;
        }
        #map-panel .map-body {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #map-panel canvas {
            position: absolute;
            top: 0; left: 0;
            image-rendering: auto;
            cursor: crosshair;
        }
        #map-panel .map-placeholder {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.97rem;
            color: #aaa;
            letter-spacing: 0.5px;
            transition: opacity 0.4s ease;
        }
        #map-panel .map-placeholder .map-status {
            font-size: 0.955rem;
            color: #ccc;
        }
        #map-panel .map-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .node-body { width: 64px; height: 64px; border-radius: 18px; }
            .node-label { font-size: 0.95rem; max-width: 80px; }
            .pulse-ring { width: 64px; height: 64px; border-radius: 18px; }
            #map-panel { width: min(220px, 50vw); height: min(220px, 50vw); }
        }

        #console-panel {
            position: fixed;
            bottom: 0; right: 0;
            width: 820px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            border-radius: 14px 0 0 0;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(0,0,0,0.06);
            border-right: none;
            border-bottom: none;
            box-shadow: -4px -4px 24px rgba(0,0,0,0.06),
                        inset 0 1px 0 rgba(255,255,255,0.9);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            overflow: visible;
        }
        #console-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
            background: rgba(255,255,255,0.9);
            border-radius: 14px 0 0 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        #console-toggle:hover {
            background: rgba(0,0,0,0.02);
        }
        #console-toggle .toggle-label {
            font-size: 0.955rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8888a0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #console-toggle .log-count {
            font-size: 0.95rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 8px;
            background: rgba(0,0,0,0.05);
            color: #8888a0;
        }
        #console-toggle .toggle-icon {
            width: 14px;
            height: 14px;
            color: #8888a0;
            transition: transform 0.3s ease;
        }
        #console-panel.open #console-toggle .toggle-icon {
            transform: rotate(180deg);
        }
        #console-content {
            max-height: 0;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #console-panel.open #console-content {
            max-height: 45vh;
        }
        #console-panel.fullscreen {
            width: 100vw;
            max-height: 100vh;
            height: 100vh;
            border-radius: 0;
            border: none;
            background: rgba(255,255,255,0.92);
        }
        #console-panel.fullscreen #console-content {
            max-height: none;
            flex: 1;
            overflow: hidden;
        }
        #console-panel.fullscreen #console-toggle {
            border-radius: 0;
        }
        #console-filter {
            display: flex;
            gap: 4px;
            padding: 6px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            flex-shrink: 0;
        }
        .filter-btn {
            font-size: 0.948rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.06);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(0,0,0,0.04); }
        .filter-btn.active {
            background: rgba(0,0,0,0.06);
            color: #555;
            border-color: rgba(0,0,0,0.1);
        }
        #console-node-filter {
            display: flex;
            gap: 4px;
            padding: 4px 14px 6px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .node-filter-btn {
            font-size: 0.948rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.06);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .node-filter-btn:hover { background: rgba(0,0,0,0.04); }
        .node-filter-btn.active {
            background: rgba(59,130,246,0.1);
            color: #3b82f6;
            border-color: rgba(59,130,246,0.2);
        }
        #console-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 4px 0;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.975rem;
            line-height: 1.6;
            color: #555;
            overscroll-behavior: contain;
        }
        #console-body::-webkit-scrollbar { width: 4px; }
        #console-body::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
        }
        .log-entry {
            padding: 2px 14px;
            display: flex;
            gap: 8px;
            align-items: baseline;
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        .log-entry:hover { background: rgba(0,0,0,0.015); }
        .log-time { color: #bbb; flex-shrink: 0; font-size: 0.952rem; }
        .log-name {
            color: #888;
            font-weight: 600;
            flex-shrink: 0;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .log-msg { color: #555; word-break: break-word; }
        .log-entry.level-warn .log-msg { color: #b45309; }
        .log-entry.level-error .log-msg,
        .log-entry.level-fatal .log-msg { color: #dc2626; }
        .log-entry.level-debug .log-msg { color: #999; }
        #console-clear {
            font-size: 0.948rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.06);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        #console-clear:hover {
            background: rgba(239,68,68,0.08);
            color: #dc2626;
            border-color: rgba(239,68,68,0.2);
        }
        @media (max-width: 600px) {
            #console-panel { width: 100%; max-height: 35vh; }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div id="header">
    <h1>Node Status Graph</h1>
    <div class="ws-status">
        <span id="ws-dot" class="ws-dot ws-disconnected"></span>
        <span id="ws-text" style="color: #dc2626;">CONNECTING...</span>
    </div>
</div>

<svg id="graph-canvas"></svg>
<div id="graph-container"></div>
<div id="seq-banner" class="seq-banner">⚡ Sequential Mode Active — Nodes auto-managed</div>
<div id="map-backdrop"></div>
<div id="map-panel">
    <div class="map-header">
        SLAM Map
        <button class="map-expand-btn" id="map-expand-btn" title="Expand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>
    </div>
    <div class="map-body">
        <div class="map-placeholder" id="map-placeholder">
            No map received
            <div class="map-status" id="map-status">subscribing to /map...</div>
        </div>
        <canvas id="map-canvas"></canvas>
    </div>
</div>
<div id="no-data">Waiting for node data...</div>

<div id="console-panel">
    <div id="console-toggle">
        <div class="toggle-label">
            Console
            <span class="log-count" id="log-count">0</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
            <button id="console-fullscreen-btn" title="Fullscreen" style="background:none;border:none;cursor:pointer;padding:2px;display:flex;">
                <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"/>
                    <polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/>
                    <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
            <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"/>
            </svg>
        </div>
    </div>
    <div id="console-content">
        <div id="console-filter">
            <button class="filter-btn active" data-level="all">All</button>
            <button class="filter-btn" data-level="10">Debug</button>
            <button class="filter-btn" data-level="20">Info</button>
            <button class="filter-btn" data-level="30">Warn</button>
            <button class="filter-btn" data-level="40">Error</button>
            <button id="console-clear" title="Clear logs">Clear</button>
        </div>
        <div id="console-node-filter">
            <button class="node-filter-btn active" data-node="all">All Nodes</button>
            <button class="node-filter-btn" data-node="navigation">navigation</button>
            <button class="node-filter-btn" data-node="exploration">exploration</button>
            <button class="node-filter-btn" data-node="blind_exploration">blind_exploration</button>
            <button class="node-filter-btn" data-node="collision_avoidance">collision_avoidance</button>
            <button class="node-filter-btn" data-node="camera_follow">camera_follow</button>
            <button class="node-filter-btn" data-node="slam">slam</button>
            <button class="node-filter-btn" data-node="roboclaw">roboclaw</button>
            <button class="node-filter-btn" data-node="urg_node_2">urg_node_2</button>
        </div>
        <div id="console-body"></div>
    </div>
</div>

<script>
    const ros = new ROSLIB.Ros({ url: `ws://${window.location.hostname || 'localhost'}:9090` });
    const wsDot = document.getElementById('ws-dot');
    const wsText = document.getElementById('ws-text');

    ros.on('connection', () => {
        wsDot.className = 'ws-dot ws-connected';
        wsText.textContent = 'CONNECTED';
        wsText.style.color = '#16a34a';
        mapStatus.textContent = 'connected, waiting for /map...';
    });
    ros.on('error', () => {
        wsDot.className = 'ws-dot ws-disconnected';
        wsText.textContent = 'ERROR';
        wsText.style.color = '#dc2626';
        mapStatus.textContent = 'rosbridge error';
    });
    ros.on('close', () => {
        wsDot.className = 'ws-dot ws-disconnected';
        wsText.textContent = 'DISCONNECTED';
        wsText.style.color = '#dc2626';
        mapStatus.textContent = 'disconnected';
    });

    const container = document.getElementById('graph-container');
    const svg = document.getElementById('graph-canvas');
    const noData = document.getElementById('no-data');

    let nodesData = {};
    let nodeElements = {};
    let isSequentialMode = false;
    let unstuckState = false;
    let buttonStates = {};

    function getStateClass(state) {
        const s = state.toLowerCase();
        if (s.includes('active')) return 'node-active';
        if (s.includes('configur')) return 'node-configuring';
        return 'node-unconfigured';
    }

    function getShortName(name) {
        let parts = name.split('/');
        let last = parts[parts.length - 1] || parts[parts.length - 2];
        return last.replace(/_/g, '\n');
    }

    const TOPOLOGY = {
        'sequential_start':        { x: 0.08, y: 0.08 },
        'urg_node_2':              { x: 0.6, y: 0.2 },
        'slam':                    { x: 0.4, y: 0.2 },
        'exploration':             { x: 0.3, y: 0.35 },
        'follow_red':              { x: 0.5, y: 0.35 },
        'navigation':              { x: 0.4, y: 0.52 },
        'blind_exploration':       { x: 0.6, y: 0.52 },
        'collision_avoidance':     { x: 0.50, y: 0.72 },
        'unstuck_toggle':          { x: 0.6, y: 0.72 },
        'roboclaw':                { x: 0.50, y: 0.90 },
    };

    const FAKE_NODES = {
        'sequential_start': { deriveFrom: null, alwaysState: 'ready' },
        'unstuck_toggle': { deriveFrom: 'buttonState', buttonKey: 'unstuck' },
    };



    const EDGES = [
        ['slam', 'navigation'],
        ['slam', 'exploration'],
        ['urg_node_2', 'slam'],
        ['urg_node_2', 'blind_exploration'],
        ['exploration', 'navigation'],
        ['follow_red', 'navigation'],
        ['navigation', 'collision_avoidance'],
        ['blind_exploration', 'collision_avoidance'],
        ['unstuck_toggle', 'collision_avoidance'],
        ['collision_avoidance', 'roboclaw'],
    ];

    const TOPOLOGY_KEYS = Object.keys(TOPOLOGY).sort((a, b) => b.length - a.length);

    function matchTopologyKey(nodeName) {
        const lower = nodeName.toLowerCase();
        for (const key of TOPOLOGY_KEYS) {
            if (lower.includes(key)) return key;
        }
        return null;
    }

    function renderGraph() {
        const realKeys = Object.keys(nodesData);
        const fakeKeys = Object.keys(FAKE_NODES);
        const allKeys = [...realKeys, ...fakeKeys.filter(k => !nodesData[k])];

        if (realKeys.length === 0 && fakeKeys.length === 0) {
            noData.style.display = 'block';
            return;
        }
        noData.style.display = 'none';

        const w = window.innerWidth;
        const h = window.innerHeight;
        const topBar = 55;

        const positions = {};
        const unmatched = [];

        for (const key of allKeys) {
            const topoKey = matchTopologyKey(key);
            if (topoKey && TOPOLOGY[topoKey]) {
                const t = TOPOLOGY[topoKey];
                positions[key] = {
                    x: t.x * w,
                    y: topBar + t.y * (h - topBar)
                };
            } else {
                unmatched.push(key);
            }
        }

        if (unmatched.length > 0) {
            const startX = 0.15;
            const spacing = 0.12;
            unmatched.forEach((key, i) => {
                positions[key] = {
                    x: (startX + i * spacing) * w,
                    y: 0.55 * h
                };
            });
        }

        const edgeMap = {};
        for (const key of allKeys) edgeMap[key] = true;

        let svgContent = `<defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M 0 1 L 8 5 L 0 9 z" fill="#c0c0d0"/>
            </marker>
            <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M 0 1 L 8 5 L 0 9 z" fill="#22c55e"/>
            </marker>
            <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>`;

        for (const [from, to] of EDGES) {
            const fromKey = allKeys.find(k => matchTopologyKey(k) === from);
            const toKey = allKeys.find(k => matchTopologyKey(k) === to);
            if (!fromKey || !toKey) continue;
            if (!positions[fromKey] || !positions[toKey]) continue;

            const pa = positions[fromKey];
            const pb = positions[toKey];

            const stateFrom = FAKE_NODES[from]?.state || nodesData[fromKey]?.toLowerCase() || '';
            const stateTo = FAKE_NODES[to]?.state || nodesData[toKey]?.toLowerCase() || '';
            const isActive = stateFrom.includes('active') && stateTo.includes('active');
            const isConfiguring = stateFrom.includes('configur') && stateTo.includes('configur');

            let strokeColor = '#d0d0dc';
            let markerRef = 'url(#arrow)';
            let strokeW = 1.5;
            if (isActive) {
                strokeColor = 'rgba(34, 197, 94, 0.4)';
                markerRef = 'url(#arrow-active)';
                strokeW = 2;
            } else if (isConfiguring) {
                strokeColor = 'rgba(234, 179, 8, 0.3)';
                strokeW = 1.8;
            }

            const dx = pb.x - pa.x;
            const dy = pb.y - pa.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = dx / len;
            const ny = dy / len;
            const rStart = 48;
            const rEnd = 78;
            const x1 = pa.x + nx * rStart;
            const y1 = pa.y + ny * rStart;
            const x2 = pb.x - nx * rEnd;
            const y2 = pb.y - ny * rEnd;

            svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
                stroke="${strokeColor}" stroke-width="${strokeW}"
                marker-end="${markerRef}" filter="url(#glow)"
                stroke-linecap="round"/>`;
        }

        svg.innerHTML = svgContent;

        for (const key of allKeys) {
            let state;
            const fake = FAKE_NODES[key];
            if (fake) {
                if (fake.alwaysState) {
                    state = fake.alwaysState;
                } else if (fake.deriveFrom === 'buttonState') {
                    state = buttonStates[fake.buttonKey] ? 'active' : 'unconfigured';
                } else if (fake.deriveFrom) {
                    const deriveKey = allKeys.find(k => matchTopologyKey(k) === fake.deriveFrom);
                    state = (deriveKey && nodesData[deriveKey]) ? nodesData[deriveKey] : 'unconfigured';
                } else {
                    state = 'unconfigured';
                }
            } else {
                state = nodesData[key];
            }
            const stateClass = getStateClass(state);
            const pos = positions[key];
            if (!pos) continue;

            if (nodeElements[key]) {
                const el = nodeElements[key];
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                const isSeqEl = matchTopologyKey(key) === 'sequential_start';
                el.className = `node ${isSeqEl ? 'node-seq-start' : stateClass}${isSeqEl && isSequentialMode ? ' seq-running' : ''}`;
                if (!isSeqEl) {
                    const badgeEl = el.querySelector('.node-state-badge');
                    badgeEl.textContent = state.toUpperCase();
                }
            } else {
                const topoKey = matchTopologyKey(key);
                const isSlam = topoKey === 'slam';
                const isRoboclaw = topoKey === 'roboclaw';
                const isUrg = topoKey === 'urg_node_2';
                const isUnstuck = topoKey === 'unstuck_toggle';
                const isSeq = topoKey === 'sequential_start';
                const icon = isSlam
                    ? `<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                         <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
                         <line x1="8" y1="2" x2="8" y2="18"/>
                         <line x1="16" y1="6" x2="16" y2="22"/>
                       </svg>`
                    : isRoboclaw
                    ? `<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                         <circle cx="12" cy="12" r="10"/>
                         <circle cx="12" cy="12" r="3"/>
                         <line x1="12" y1="2" x2="12" y2="5"/>
                         <line x1="12" y1="19" x2="12" y2="22"/>
                         <line x1="2" y1="12" x2="5" y2="12"/>
                         <line x1="19" y1="12" x2="22" y2="12"/>
                       </svg>`
                    : isUrg
                    ? `<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                         <circle cx="12" cy="12" r="10"/>
                         <circle cx="12" cy="12" r="8"/>
                         <line x1="12" y1="4" x2="12" y2="8"/>
                         <line x1="12" y1="16" x2="12" y2="20"/>
                         <line x1="4" y1="12" x2="8" y2="12"/>
                         <line x1="16" y1="12" x2="20" y2="12"/>
                       </svg>`
                    : isUnstuck
                    ? `<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                         <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/>
                         <path d="M9 12l2 2 4-4"/>
                       </svg>`
                    : isSeq
                    ? `<svg class="node-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                         <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                       </svg>`
                    : `<div class="led-core"></div>`;

                const el = document.createElement('div');
                el.className = `node ${isSeq ? 'node-seq-start' : stateClass}${isSeq && isSequentialMode ? ' seq-running' : ''}`;
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                el.style.opacity = '0';
                const badgeText = state.toUpperCase();
                const labelText = isSeq ? 'AUTO' : isUnstuck ? 'UNSTUCK' : getShortName(key);
                el.innerHTML = `
                    <div class="node-body">
                        <div class="node-click-flash">
                            <div class="ring"></div>
                            <div class="ring"></div>
                            <div class="ring"></div>
                            <div class="burst"></div>
                        </div>
                        <div class="pulse-ring"></div>
                        ${icon}
                    </div>
                    <div class="node-label">${labelText}</div>
                    <div class="node-state-badge">${badgeText}</div>
                `;
                if (topoKey) {
                    el.addEventListener('click', () => {
                        if (isUnstuck) {
                            sendCommand('toggle', 'unstuck');
                        } else {
                            sendCommand('launch', topoKey);
                        }
                        const flash = el.querySelector('.node-click-flash');
                        flash.classList.remove('animate');
                        void flash.offsetWidth;
                        flash.classList.add('animate');
                    });
                }
                container.appendChild(el);
                nodeElements[key] = el;
                requestAnimationFrame(() => { el.style.opacity = '1'; });
            }
        }

        for (const key of Object.keys(nodeElements)) {
            if (!allKeys.includes(key)) {
                nodeElements[key].style.opacity = '0';
                setTimeout(() => {
                    nodeElements[key]?.remove();
                    delete nodeElements[key];
                }, 400);
            }
        }
    }

    const commandPublisher = new ROSLIB.Topic({
        ros: ros,
        name: '/web_interface/api_command',
        messageType: 'std_msgs/msg/String'
    });

    function sendCommand(action, target, args = "") {
        const payload = JSON.stringify({ action: action, target: target, args: args });
        const message = new ROSLIB.Message({ data: payload });
        commandPublisher.publish(message);
        console.log("Command:", payload);
    }

    const nodeStateListener = new ROSLIB.Topic({
        ros: ros,
        name: '/web_interface/node_states',
        messageType: 'std_msgs/msg/String'
    });

    nodeStateListener.subscribe(function(message) {
        try {
            const states = JSON.parse(message.data);
            nodesData = states;
            renderGraph();
        } catch (e) {
            console.error('Error parsing node states:', e);
        }
    });

    const seqBanner = document.getElementById('seq-banner');

    const buttonStateListener = new ROSLIB.Topic({
        ros: ros,
        name: '/web_interface/button_states',
        messageType: 'std_msgs/msg/String'
    });

    buttonStateListener.subscribe(function(message) {
        try {
            const bs = JSON.parse(message.data);
            buttonStates = bs;
            const wasSeq = isSequentialMode;
            isSequentialMode = bs.sequential_start === true;
            const wasUnstuck = unstuckState;
            unstuckState = bs.unstuck === true;
            if (wasSeq !== isSequentialMode || wasUnstuck !== unstuckState) {
                if (wasSeq !== isSequentialMode) {
                    seqBanner.classList.toggle('visible', isSequentialMode);
                }
            }
            renderGraph();
        } catch (e) {
            console.error('Error parsing button states:', e);
        }
    });

    window.addEventListener('resize', renderGraph);

    const mapPanel = document.getElementById('map-panel');
    const mapCanvas = document.getElementById('map-canvas');
    const mapPlaceholder = document.getElementById('map-placeholder');
    const mapStatus = document.getElementById('map-status');
    const mapCtx = mapCanvas.getContext('2d');

    let mapInfo = null;
    let mapImage = null;
    let robotPose = null;
    let plannedPath = null;
    let goalPose = null;
    let mapTransform = null;

    function worldToPixel(wx, wy) {
        if (!mapInfo || !mapTransform) return null;
        const res = mapInfo.resolution;
        const ox = mapInfo.origin.position.x;
        const oy = mapInfo.origin.position.y;
        const gw = mapInfo.width;
        const gh = mapInfo.height;
        const ori = mapInfo.origin.orientation;

        let dx = wx - ox;
        let dy = wy - oy;
        let gridX, gridY;
        if (ori && (ori.x !== 0 || ori.y !== 0 || ori.z !== 0)) {
            const yaw = 2 * Math.atan2(ori.z, ori.w);
            const c = Math.cos(yaw), s = Math.sin(yaw);
            gridX = (c * dx + s * dy) / res;
            gridY = (-s * dx + c * dy) / res;
        } else {
            gridX = dx / res;
            gridY = dy / res;
        }

        return {
            x: mapTransform.offsetX + gridX * mapTransform.scale,
            y: mapTransform.offsetY + (gh - 1 - gridY) * mapTransform.scale
        };
    }

    function drawMap() {
        if (!mapImage || !mapInfo) return;

        const body = document.querySelector('#map-panel .map-body');
        const rect = body.getBoundingClientRect();
        const cw = rect.width;
        const ch = rect.height;
        if (cw === 0 || ch === 0) return;

        const dpr = window.devicePixelRatio || 1;
        const bufW = Math.round(cw * dpr);
        const bufH = Math.round(ch * dpr);
        mapCanvas.width = bufW;
        mapCanvas.height = bufH;
        mapCanvas.style.width = cw + 'px';
        mapCanvas.style.height = ch + 'px';

        const gw = mapInfo.width;
        const gh = mapInfo.height;
        const scale = Math.min(bufW / gw, bufH / gh);
        const offsetX = (bufW - gw * scale) / 2;
        const offsetY = (bufH - gh * scale) / 2;
        mapTransform = { scale, offsetX, offsetY };

        mapCtx.clearRect(0, 0, bufW, bufH);
        mapCtx.imageSmoothingEnabled = true;
        mapCtx.imageSmoothingQuality = 'high';
        mapCtx.drawImage(mapImage, offsetX, offsetY, gw * scale, gh * scale);

        if (goalPose) {
            const p = worldToPixel(goalPose.x, goalPose.y);
            if (p) {
                const gyaw = 2 * Math.atan2(goalPose.qz, goalPose.qw);
                mapCtx.save();
                mapCtx.translate(p.x, p.y);
                mapCtx.rotate(-gyaw);
                const s = Math.max(6, scale * 0.12);
                mapCtx.beginPath();
                mapCtx.arc(0, 0, s, 0, Math.PI * 2);
                mapCtx.fillStyle = 'rgba(231, 76, 60, 0.85)';
                mapCtx.fill();
                mapCtx.strokeStyle = '#fff';
                mapCtx.lineWidth = 2;
                mapCtx.stroke();
                mapCtx.beginPath();
                mapCtx.moveTo(0, -s * 1.6);
                mapCtx.lineTo(-s * 0.7, s * 0.4);
                mapCtx.lineTo(s * 0.7, s * 0.4);
                mapCtx.closePath();
                mapCtx.fillStyle = 'rgba(231, 76, 60, 0.7)';
                mapCtx.fill();
                mapCtx.restore();
            }
        }

        if (plannedPath && plannedPath.length > 1) {
            mapCtx.beginPath();
            const first = worldToPixel(plannedPath[0].x, plannedPath[0].y);
            if (first) {
                mapCtx.moveTo(first.x, first.y);
                for (let i = 1; i < plannedPath.length; i++) {
                    const pp = worldToPixel(plannedPath[i].x, plannedPath[i].y);
                    if (pp) mapCtx.lineTo(pp.x, pp.y);
                }
            }
            mapCtx.strokeStyle = 'rgba(52, 152, 219, 0.85)';
            mapCtx.lineWidth = Math.max(2, scale * 0.2);
            mapCtx.lineCap = 'round';
            mapCtx.lineJoin = 'round';
            mapCtx.setLineDash([scale * 0.3, scale * 0.15]);
            mapCtx.stroke();
            mapCtx.setLineDash([]);
        }

        if (robotPose) {
            const p = worldToPixel(robotPose.x, robotPose.y);
            if (p) {
                const ryaw = 2 * Math.atan2(robotPose.qz, robotPose.qw);
                mapCtx.save();
                mapCtx.translate(p.x, p.y);
                mapCtx.rotate(-ryaw);
                const r = Math.max(4, scale * 0.12);
                mapCtx.beginPath();
                mapCtx.arc(0, 0, r, 0, Math.PI * 2);
                mapCtx.fillStyle = 'rgba(39, 174, 96, 0.9)';
                mapCtx.fill();
                mapCtx.strokeStyle = '#fff';
                mapCtx.lineWidth = 1.5;
                mapCtx.stroke();
                mapCtx.beginPath();
                mapCtx.moveTo(0, -r * 1.5);
                mapCtx.lineTo(-r * 0.8, r * 0.6);
                mapCtx.lineTo(r * 0.8, r * 0.6);
                mapCtx.closePath();
                mapCtx.fillStyle = 'rgba(39, 174, 96, 0.7)';
                mapCtx.fill();
                mapCtx.restore();
            }
        }
    }

    const mapListener = new ROSLIB.Topic({
        ros: ros,
        name: '/map',
        messageType: 'nav_msgs/msg/OccupancyGrid',
        throttle_rate: 500
    });

    mapListener.subscribe(function(message) {
        try {
            const info = message.info;
            const w = info.width;
            const h = info.height;
            const data = message.data;
            if (!w || !h || !data) return;

            mapInfo = {
                width: w,
                height: h,
                resolution: info.resolution,
                origin: info.origin
            };

            const imageData = mapCtx.createImageData(w, h);
            const pixels = imageData.data;

            for (let i = 0; i < data.length; i++) {
                const val = typeof data[i] === 'number' ? data[i] : parseInt(data[i]);
                const gx = i % w;
                const gy = Math.floor(i / w);
                const py = (h - 1 - gy) * w + gx;
                const p = py * 4;
                if (val === -1) {
                    pixels[p]     = 0;
                    pixels[p + 1] = 0;
                    pixels[p + 2] = 0;
                    pixels[p + 3] = 0;
                } else if (val === 0) {
                    pixels[p]     = 215;
                    pixels[p + 1] = 230;
                    pixels[p + 2] = 245;
                    pixels[p + 3] = 255;
                } else {
                    const t = Math.min(val / 100, 1);
                    pixels[p]     = Math.round(60 - t * 40);
                    pixels[p + 1] = Math.round(60 - t * 40);
                    pixels[p + 2] = Math.round(65 - t * 40);
                    pixels[p + 3] = Math.round(200 + t * 55);
                }
            }

            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = w;
            tmpCanvas.height = h;
            tmpCanvas.getContext('2d').putImageData(imageData, 0, 0);
            mapImage = new Image();
            mapImage.onload = () => {
                const resolved = resolveBaseFootprint();
                if (resolved) {
                    if (resolved.translation) {
                        robotPose = {
                            x: resolved.translation.x, y: resolved.translation.y,
                            qz: resolved.rotation.z, qw: resolved.rotation.w
                        };
                    } else {
                        robotPose = { x: resolved.x, y: resolved.y, qz: resolved.qz, qw: resolved.qw };
                    }
                }
                drawMap();
            };
            mapImage.src = tmpCanvas.toDataURL();

            mapPanel.classList.add('visible');
            mapPlaceholder.classList.add('hidden');
            mapStatus.textContent = `${w}x${h} | res: ${info.resolution}m`;
        } catch (e) {
            console.error('Error rendering map:', e);
            mapStatus.textContent = 'render error: ' + e.message;
        }
    });

    const tfCache = {};

    function composeTransform(parent, child) {
        const cy = 2 * Math.atan2(parent.rotation.z, parent.rotation.w);
        return {
            x: parent.translation.x + Math.cos(cy) * child.translation.x - Math.sin(cy) * child.translation.y,
            y: parent.translation.y + Math.sin(cy) * child.translation.x + Math.cos(cy) * child.translation.y,
            qz: child.rotation.z,
            qw: child.rotation.w
        };
    }

    function resolveBaseFootprint() {
        const bf = tfCache['map->base_footprint'];
        if (bf) return bf;

        const mapOdom = tfCache['map->odom'];
        const odomBf = tfCache['odom->base_footprint'];
        if (mapOdom && odomBf) return composeTransform(mapOdom, odomBf);

        return tfCache['odom->base_footprint'] || null;
    }

    function handleTfMessage(message) {
        for (const tfMsg of message.transforms) {
            const parent = tfMsg.header.frame_id;
            const child = tfMsg.child_frame_id;
            const key = `${parent}->${child}`;
            tfCache[key] = {
                translation: tfMsg.transform.translation,
                rotation: tfMsg.transform.rotation
            };
        }

        const resolved = resolveBaseFootprint();
        if (resolved) {
            if (resolved.translation) {
                robotPose = {
                    x: resolved.translation.x, y: resolved.translation.y,
                    qz: resolved.rotation.z, qw: resolved.rotation.w
                };
            } else {
                robotPose = { x: resolved.x, y: resolved.y, qz: resolved.qz, qw: resolved.qw };
            }
            drawMap();
        }
    }

    const tfTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/tf',
        messageType: 'tf2_msgs/msg/TFMessage'
    });
    tfTopic.subscribe(handleTfMessage);

    const tfStaticTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/tf_static',
        messageType: 'tf2_msgs/msg/TFMessage'
    });
    tfStaticTopic.subscribe(handleTfMessage);

    setInterval(() => {
        if (!mapInfo || !mapImage) return;
        const resolved = resolveBaseFootprint();
        if (resolved) {
            if (resolved.translation) {
                robotPose = {
                    x: resolved.translation.x, y: resolved.translation.y,
                    qz: resolved.rotation.z, qw: resolved.rotation.w
                };
            } else {
                robotPose = { x: resolved.x, y: resolved.y, qz: resolved.qz, qw: resolved.qw };
            }
            drawMap();
        }
    }, 500);

    const pathListener = new ROSLIB.Topic({
        ros: ros,
        name: '/planned_path',
        messageType: 'nav_msgs/msg/Path'
    });
    pathListener.subscribe(function(message) {
        if (message.poses && message.poses.length > 0) {
            plannedPath = message.poses.map(function(p) {
                return { x: p.pose.position.x, y: p.pose.position.y };
            });
        } else {
            plannedPath = null;
        }
        drawMap();
    });

    const goalListener = new ROSLIB.Topic({
        ros: ros,
        name: '/goal_pose',
        messageType: 'geometry_msgs/msg/PoseStamped'
    });
    goalListener.subscribe(function(message) {
        goalPose = {
            x: message.pose.position.x,
            y: message.pose.position.y,
            qz: message.pose.orientation.z,
            qw: message.pose.orientation.w
        };
        drawMap();
    });

    function pixelToWorld(px, py) {
        if (!mapInfo || !mapTransform) return null;
        const res = mapInfo.resolution;
        const ox = mapInfo.origin.position.x;
        const oy = mapInfo.origin.position.y;
        const gw = mapInfo.width;
        const gh = mapInfo.height;
        const ori = mapInfo.origin.orientation;

        const gridX = (px - mapTransform.offsetX) / mapTransform.scale;
        const gridY = gh - 1 - (py - mapTransform.offsetY) / mapTransform.scale;

        let wx = ox + gridX * res;
        let wy = oy + gridY * res;

        if (ori && (ori.x !== 0 || ori.y !== 0 || ori.z !== 0)) {
            const yaw = 2 * Math.atan2(ori.z, ori.w);
            const c = Math.cos(yaw), s = Math.sin(yaw);
            const rdx = gridX * res;
            const rdy = gridY * res;
            wx = ox + c * rdx - s * rdy;
            wy = oy + s * rdx + c * rdy;
        }

        return { x: wx, y: wy };
    }

    const goalPublisher = new ROSLIB.Topic({
        ros: ros,
        name: '/goal_pose',
        messageType: 'geometry_msgs/msg/PoseStamped'
    });

    mapCanvas.addEventListener('click', function(e) {
        if (!mapInfo || !mapTransform) return;

        const dpr = window.devicePixelRatio || 1;
        const bodyRect = document.querySelector('#map-panel .map-body').getBoundingClientRect();
        const px = (e.clientX - bodyRect.left) * dpr;
        const py = (e.clientY - bodyRect.top) * dpr;

        const world = pixelToWorld(px, py);
        if (!world) return;

        const goalMsg = new ROSLIB.Message({
            header: {
                stamp: { sec: 0, nanosec: 0 },
                frame_id: 'map'
            },
            pose: {
                position: { x: world.x, y: world.y, z: 0.0 },
                orientation: { x: 0.0, y: 0.0, z: 0.0, w: 1.0 }
            }
        });
        goalPublisher.publish(goalMsg);
    });

    const mapExpandBtn = document.getElementById('map-expand-btn');
    const mapBackdrop = document.getElementById('map-backdrop');
    let mapExpanded = false;

    function toggleMapExpand() {
        mapExpanded = !mapExpanded;
        mapPanel.classList.add('expanding');

        if (mapExpanded) {
            const rect = mapPanel.getBoundingClientRect();
            const targetW = window.innerWidth - 32;
            const targetH = window.innerHeight - 32;
            const ratio = Math.min(rect.width / targetW, rect.height / targetH);

            mapPanel.classList.add('expanded');
            mapPanel.style.transform = `scale(${ratio})`;
            mapBackdrop.classList.add('visible');

            void mapPanel.offsetHeight;
            mapPanel.style.transform = '';
        } else {
            const rect = mapPanel.getBoundingClientRect();
            const smallW = Math.min(280, window.innerWidth * 0.4);
            const smallH = Math.min(280, window.innerHeight * 0.4);
            const ratio = Math.min(smallW / rect.width, smallH / rect.height);

            mapPanel.style.transformOrigin = 'bottom left';
            mapPanel.style.transform = `scale(${ratio})`;
            mapBackdrop.classList.remove('visible');

            const onEnd = () => {
                mapPanel.classList.remove('expanded', 'expanding');
                mapPanel.style.transform = '';
                mapPanel.style.transformOrigin = '';
                mapPanel.removeEventListener('transitionend', onEnd);
                drawMap();
            };
            mapPanel.addEventListener('transitionend', onEnd);
        }

        mapExpandBtn.innerHTML = mapExpanded
            ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                 <polyline points="4 14 10 14 10 20"/>
                 <polyline points="20 10 14 10 14 4"/>
                 <line x1="14" y1="10" x2="21" y2="3"/>
                 <line x1="3" y1="21" x2="10" y2="14"/>
               </svg>`
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                 <polyline points="15 3 21 3 21 9"/>
                 <polyline points="9 21 3 21 3 15"/>
                 <line x1="21" y1="3" x2="14" y2="10"/>
                 <line x1="3" y1="21" x2="10" y2="14"/>
               </svg>`;

        if (mapExpanded) setTimeout(drawMap, 520);
    }

    mapExpandBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMapExpand();
    });

    mapBackdrop.addEventListener('click', () => {
        if (mapExpanded) toggleMapExpand();
    });

    const mapBody = document.querySelector('#map-panel .map-body');
    const resizeObs = new ResizeObserver(() => { drawMap(); });
    resizeObs.observe(mapBody);

    // Console panel
    const consolePanel = document.getElementById('console-panel');
    const consoleToggle = document.getElementById('console-toggle');
    const consoleBody = document.getElementById('console-body');
    const logCountEl = document.getElementById('log-count');
    const consoleClear = document.getElementById('console-clear');
    const filterBtns = document.querySelectorAll('#console-filter .filter-btn');
    const nodeFilterBtns = document.querySelectorAll('#console-node-filter .node-filter-btn');
    const MAX_LOGS = 10000;
    let logCount = 0;
    let activeFilter = 'all';
    let activeNodeFilters = new Set();
    let autoScroll = true;
    let logs = [];

    const fsBtn = document.getElementById('console-fullscreen-btn');

    consoleToggle.addEventListener('click', (e) => {
        if (e.target.closest('#console-fullscreen-btn')) return;
        consolePanel.classList.toggle('open');
    });

    fsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        consolePanel.classList.add('open');
        consolePanel.classList.toggle('fullscreen');
    });

    consoleBody.addEventListener('scroll', () => {
        autoScroll = consoleBody.scrollTop + consoleBody.clientHeight >= consoleBody.scrollHeight - 20;
    });

    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (e.target === consoleClear) return;
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.level;
            renderLogs();
        });
    });

    nodeFilterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const node = btn.dataset.node;
            if (node === 'all') {
                activeNodeFilters.clear();
                nodeFilterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                document.querySelector('#console-node-filter .node-filter-btn[data-node="all"]').classList.remove('active');
                btn.classList.toggle('active');
                if (btn.classList.contains('active')) {
                    activeNodeFilters.add(node);
                } else {
                    activeNodeFilters.delete(node);
                }
                if (activeNodeFilters.size === 0) {
                    document.querySelector('#console-node-filter .node-filter-btn[data-node="all"]').classList.add('active');
                }
            }
            renderLogs();
        });
    });

    consoleClear.addEventListener('click', (e) => {
        e.stopPropagation();
        logs = [];
        logCount = 0;
        logCountEl.textContent = '0';
        consoleBody.innerHTML = '';
    });

    function levelClass(level) {
        if (level >= 50) return 'level-fatal';
        if (level >= 40) return 'level-error';
        if (level >= 30) return 'level-warn';
        if (level >= 10) return 'level-debug';
        return '';
    }

    function matchesNodeFilter(name) {
        if (activeNodeFilters.size === 0) return true;
        const lower = name.toLowerCase();
        for (const n of activeNodeFilters) {
            if (lower.includes(n)) return true;
        }
        return false;
    }

    function renderLogs() {
        const fragment = document.createDocumentFragment();
        logs.forEach(entry => {
            if (activeFilter !== 'all' && entry.level !== parseInt(activeFilter)) return;
            if (!matchesNodeFilter(entry.name)) return;
            const el = document.createElement('div');
            el.className = 'log-entry ' + levelClass(entry.level);
            el.innerHTML = '<span class="log-time">' + entry.time + '</span>' +
                '<span class="log-name">' + entry.name + '</span>' +
                '<span class="log-msg">' + entry.msg + '</span>';
            fragment.appendChild(el);
        });
        consoleBody.innerHTML = '';
        consoleBody.appendChild(fragment);
        if (autoScroll) consoleBody.scrollTop = consoleBody.scrollHeight;
    }

    const rosoutTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/rosout',
        messageType: 'rcl_interfaces/msg/Log',
        throttle_rate: 200
    });

    rosoutTopic.subscribe(function(message) {
        const d = message.stamp ? new Date(message.stamp.sec * 1000 + Math.round(message.stamp.nanosec / 1e6)) : new Date();
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        const s = String(d.getSeconds()).padStart(2, '0');
        const ms = String(d.getMilliseconds()).padStart(3, '0');
        const time = h + ':' + m + ':' + s + '.' + ms;

        const name = message.name || '';
        const msg = message.msg || '';
        const level = message.level || 20;

        logs.push({ time, name, msg, level });
        logCount++;
        logCountEl.textContent = logCount;

        if (logs.length > MAX_LOGS) {
            logs.splice(0, logs.length - MAX_LOGS);
        }

        if (activeFilter !== 'all' && level !== parseInt(activeFilter)) return;
        if (!matchesNodeFilter(name)) return;

        const el = document.createElement('div');
        el.className = 'log-entry ' + levelClass(level);
        el.innerHTML = '<span class="log-time">' + time + '</span>' +
            '<span class="log-name">' + name + '</span>' +
            '<span class="log-msg">' + msg + '</span>';

        consoleBody.appendChild(el);

        while (consoleBody.children.length > MAX_LOGS) {
            consoleBody.removeChild(consoleBody.firstChild);
        }

        if (autoScroll) consoleBody.scrollTop = consoleBody.scrollHeight;
    });
</script>
</body>
</html>
